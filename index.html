function SidePanel({customer,onClose,onUpdate,onDelete}){const[edit,setEdit]=useState({...customer});const[nn,setNn]=useState('');useEffect(()=>setEdit({...customer}),[customer]);const Field=({label,field,type='text'})=>(<div style={{marginBottom:12}}><label style={{fontSize:11,color:'var(--text3)',display:'block',marginBottom:3}}>{label}</label>{type==='select'?<select value={edit[field]} onChange={e=>setEdit({...edit,[field]:e.target.value})} style={{width:'100%',padding:'8px 10px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:13,outline:'none'}}>{field==='column'&&COLUMNS.map(c=><option key={c.id} value={c.id}>{c.title}</option>)}{field==='priority'&&['high','medium','low'].map(p=><option key={p} value={p}>{p==='high'?'긴급':p==='medium'?'보통':'일반'}</option>)}{field==='source'&&SOURCES.map(s=><option key={s} value={s}>{s}</option>)}{field==='nextAction'&&['전화','문자','미팅','시승','계약서'].map(a=><option key={a} value={a}>{a}</option>)}</select>:type==='textarea'?<textarea value={edit[field]||''} onChange={e=>setEdit({...edit,[field]:e.target.value})} style={{width:'100%',padding:'8px 10px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:13,resize:'vertical',minHeight:60,outline:'none',fontFamily:'inherit'}}/>:<input type={type} value={edit[field]||''} onChange={e=>setEdit({...edit,[field]:e.target.value})} style={{width:'100%',padding:'8px 10px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:13,outline:'none'}}/>}</div>);return(<div style={{position:'fixed',top:0,right:0,width:Math.min(420,window.innerWidth),height:'100vh',background:'var(--surface)',borderLeft:'1px solid var(--border)',zIndex:1000,display:'flex',flexDirection:'column',boxShadow:'-8px 0 30px rgba(0,0,0,.4)'}}><div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems function App(){const[customers,setCustomers]=useState(initialCustomers);const[selected,setSelected]=useState(null);const[search,setSearch]=useState('');const[fp,setFp]=useState('all');const[addModal,setAddModal]=useState(null);const filtered=useMemo(()=>{let l=customers;if(search){const s=search.toLowerCase();l=l.filter(c=>c.name.includes(s)||c.model.toLowerCase().includes(s)||c.phone.includes(s))}if(fp!=='all')l=l.filter(c=>c.priority===fp);return l},[customers,search,fp]);const m=useMemo(()=>{const t=customers.length;const b={};COLUMNS.forEach(c=>b[c.id]=customers.filter(x=>x.column===c.id).length);const h=customers.filter(c=>c.priority==='high').length;const td=new Date().toISOString().slice(0,10);const tt=customers.filter(c=>c.nextDate<=td&&(c.column==='contact'||c.column==='decision')).length;return{t,b,h,tt}},[customers]);const hDrop=useCallback((id,nc)=>{setCustomers(p=>p.map(c=>c.id===id?{...c,column:nc}:c))},[]);const hUpd=useCallback(u=>{setCustomers(p=>p.map(c=>c.id===u.id?u:c));setSelected(u)},[]);const hDel=useCallback(id=>{setCustomers(p=>p.filter(c=>c.id!==id));setSelected(null)},[]);const hAdd=useCallback(f=>{setCustomers(p=>[{...f,id:'c'+Date.now(),tags:[],history:[{date:new Date().toISOString().slice(0,10),type:'등록',note:'신규 고객 등록'}],createdAt:new Date().toISOString().slice(0,10),priority:'low',nextAction:'전화',nextDate:new Date().toISOString().slice(0,10),source:'전시장방문',color:'옵시디언 블랙'},...p]);setAddModal(null)},[]);
return(<div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}><header style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',padding:'12px 20px',position:'sticky',top:0,zIndex:100}}><div style={{maxWidth:1600,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{fontSize:20,fontWeight:700,color:'var(--gold)',letterSpacing:-0.5}}>BenzDream</div><span style={{fontSize:11,color:'var(--text3)',padding:'2px 8px',background:'var(--surface2)',borderRadius:4}}>CRM</span></div><div style={{display:'flex',alignItems:'center',gap:10,flex:'1',maxWidth:500,minWidth:200}}><div style={{display:'flex',alignItems:'center',flex:1,background:'var(--bg)',borderRadius:8,padding:'6px 12px',border:'1px solid var(--border)'}}><Icon name="search" size={15} color="var(--text3)"/><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="이름, 모델, 전화번호 검색..." style={{flex:1,border:'none',background:'none',outline:'none',color:'var(--text)',fontSize:13,marginLeft:8,fontFamily:'inherit'}}/>{search&&<button onClick={()=>setSearch('')} style={{background:'none',border:'none',cursor:'pointer',display:'flex',padding:2}}><Icon name="x" size={13} color="var(--text3)"/></button>}</div><select value={fp} onChange={e=>setFp(e.target.value)} style={{padding:'7px 10px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:12,outline:'none',cursor:'pointer'}}><option value="all">전체</option><option value="high">긴급</option><option value="medium">보통</option><option value="low">일반</option></select></div></div></header>
<main style={{flex:1,padding:20,maxWidth:1600,margin:'0 auto',width:'100%'}}><div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}><MetricCard label="전체 고객" value={m.t} sub={'긴급 '+m.h+'건'}/><MetricCard label="첫 컨택" value={m.b.contact} color="var(--blue)"/><MetricCard label="의사결정" value={m.b.decision} color="var(--orange)"/><MetricCard label="계약진행" value={m.b.contract} color="var(--purple)"/><MetricCard label="출고완료" value={m.b.delivery} color="var(--green)"/><MetricCard label="오늘 할 일" value={m.tt} sub="처리 필요" color="var(--red)"/></div><div style={{display:'flex',gap:16,overflow:'auto',paddingBottom:20}}>{COLUMNS.map(col=><KanbanColumn key={col.id} col={col} customers={filtered.filter(c=>c.column===col.id)} onCardClick={setSelected} onDragStart={()=>{}} onDrop={hDrop} onAddClick={colId=>setAddModal(colId)}/>)}</div></main><footer style={{textAlign:'center',padding:'12px',color:'var(--text3)',fontSize:11,borderTop:'1px solid var(--border)'}}>BenzDream CRM v1.0 — 벤츠드림 고객관리 시스템</footer>{selected&&<><div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.3)',zIndex:999}} onClick={()=>setSelected(null)}/><SidePanel customer={selected} onClose={()=>setSelected(null)} onUpdate={hUpd} onDelete={hDel}/></>}{addModal&&<AddModal column={addModal} onAdd={hAdd} onClose={()=>setAddModal(null)}/>}</div>)}ReactDOM.createRoot(document.getElementById('root')).render(<App/>);</script></body></html>
